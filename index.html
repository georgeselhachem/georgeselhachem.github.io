<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار السوق العمومي</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
h2 { text-align:center }
.question { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
.option { padding:10px; margin:5px 0; border-radius:6px; cursor:pointer; border:1px solid #ccc; }
.correct { background:#4CAF50; color:white; }
.wrong { background:#f44336; color:white; }
button { padding:10px 15px; margin:10px 5px; border:none; border-radius:8px; cursor:pointer }
#controls { text-align:center; margin-bottom:20px }
</style>
</head>
<body>
<h2>🚖 اختبار السوق العمومي</h2>

<div id="controls">
<button onclick="resetQuiz()">🔄 إعادة المحاولة</button>
<button onclick="shuffleQuestions()">🔀 خلط الأسئلة</button>
</div>

<div id="quiz"></div>

<script>
const questions = [
{q:"يمنع التوقف لاصعاد او نزول الركاب ضمن مسافة من التقاطع؟", options:["10 متر","25 متر","40 متر"], correct:1},
{q:"يمنع التوقف لاستجلاب ركاب؟", options:["قرب التقاطعات","على المنعطفات","كل ما ورد"], correct:2},
{q:"على السائقين التقيد بقاعدة؟", options:["افساح المرور","حق المرور","كل ما ورد"], correct:2},
{q:"حق المرور يعتبر من؟", options:["الحقوق العقارية","حقوق السائقين","حقوق المشاة"], correct:0},
{q:"حق الأفضلية يعتبر من؟", options:["تصنيف الطريق","حقوق السائقين","القوى المسلحة"], correct:1},
{q:"افساح الطريق يعتبر؟", options:["قاعدة دولية","متعارف محلياً","كرم اخلاق"], correct:0},
{q:"ينبغي افساح المرور بعد؟", options:["تشغيل الفلاشر","اشارة الاتجاه","كل ما ورد"], correct:2},
{q:"الحوار مع الركاب يؤثر على؟", options:["التركيز","تعدد المهام","كل ما ورد"], correct:2},
{q:"عند الاقتراب من تقاطع؟", options:["النظر بالمرايا مرتين","مرة مع اشارات","طلب مساعدة"], correct:0},
{q:"عند وجود مخاطر؟", options:["التمهل","مضاعفة الانتباه","كل ما ورد"], correct:2},
{q:"صيانة السيارة؟", options:["استباقي","عند عطل","دوري"], correct:2},
{q:"نظافة السيارة؟", options:["اختياري","الزامي","عام"], correct:1},
{q:"واجبات السائق؟", options:["علبة اسعاف","عدة تنظيف","كل ما ورد"], correct:2},
{q:"يمكن العمل؟", options:["لوحة عمومية","خصوصية","كلها"], correct:0},
{q:"سلامة الاطارات؟", options:["العمر","النوعية","كل ما ورد"], correct:2},
{q:"الوزن الإجمالي؟", options:["عدم تجاوزه","تجاوزه مسموح","غير مهم"], correct:0},
{q:"ترتيب الحمولة؟", options:["الأثقل اسفل","الأخف اسفل","عشوائي"], correct:0},
{q:"ترخيص سيارة سياحية؟", options:["مناطق","فئة ركاب","كل ما ورد"], correct:2},
{q:"التاكسيميتر؟", options:["مكاتب","افراد","كلها"], correct:2},
{q:"تشغيل التاكسيميتر؟", options:["مع التوقف","بدون توقف","مسافة فقط"], correct:0},
{q:"واجبات المالك؟", options:["ضمان","مسؤولية","كل ما ورد"], correct:2},
{q:"العمل بالمناطق؟", options:["ضمن الترخيص","مع استثناء","كل المناطق"], correct:0},
{q:"النقابة؟", options:["اختياري","الزامي","حسب المنطقة"], correct:0},
{q:"هدف النقابة؟", options:["حماية","سياسة","كل ما ورد"], correct:0},
{q:"التعرفة؟", options:["وزارة النقل","نقابة","السائق"], correct:0},
{q:"حمولة السطح؟", options:["انقلاب","وقود","كل ما ورد"], correct:2},
{q:"السجل المروري؟", options:["سحب مؤقت","الغاء","كل ما ورد"], correct:2},
{q:"عدد النقاط؟", options:["10","12","20"], correct:1},
{q:"عند اهانة؟", options:["المثل","هدوء","تبليغ"], correct:1},
{q:"الحمولة الإضافية؟", options:["طول","عرض","كل ما ورد"], correct:2},
{q:"السرعة داخل المدن؟", options:["50","80","100"], correct:0},
{q:"تقاطع بدون اشارة؟", options:["استمرار","تخفيف ويمين","اضاءة"], correct:1},
{q:"طلب راكب النزول؟", options:["أماكن مخصصة","أي مكان","داخل المدن"], correct:0},
{q:"حزام الأمان؟", options:["تزيين","حماية","لا فائدة"], correct:1},
{q:"اشارة حمراء؟", options:["استمرار","توقف","قبل ممر"], correct:1},
{q:"اضواء رباعية؟", options:["توقف اضطراري","داخل مدينة","تجاوز"], correct:0},
{q:"تحميل حقائب؟", options:["حضن","صندوق","أي مكان"], correct:1},
{q:"تحميل الركاب؟", options:["أماكن مخصصة","أي مكان","منعطفات"], correct:0},
{q:"أمتعة كبيرة؟", options:["لا تعيق","فوق المقاعد","تمنع الابواب"], correct:0},
{q:"استلام الأجرة؟", options:["أثناء القيادة","بعد التوقف","بسرعة"], correct:1},
{q:"عدد الركاب؟", options:["حسب المقاعد","وقوف","مضاعف"], correct:0},
{q:"اصعاد الركاب؟", options:["أماكن مخصصة","أي مكان","حسب السائق"], correct:0},
{q:"نقل أمتعة؟", options:["لا تعيق","15 سم","30 سم"], correct:0},
{q:"غاز؟", options:["مسموح","ممنوع","بموافقة"], correct:1},
{q:"تصنيف الطرق؟", options:["3","4","5"], correct:0},
{q:"تسجيل الضمان؟", options:["مالك/غير","لبناني/اجنبي","خاص/عمومي"], correct:0},
{q:"اشتراكات؟", options:["تقاعد","مالك","غير مالك"], correct:2},
{q:"التسجيل؟", options:["طلب","فوراً","اختياري"], correct:0},
{q:"تأخر الدفع؟", options:["توقف","غرامة","كل ما ورد"], correct:2},
{q:"مدة العمل؟", options:["35","48","60"], correct:1},
{q:"الهاتف؟", options:["رسائل","سماعة","توقف"], correct:1},
{q:"افساح للمشاة؟", options:["اقتراب","نزول","بعد نزول"], correct:1},
{q:"موازاة سيارة؟", options:["يسمح","بعض الطرق","لا يسمح"], correct:2},
{q:"سيارة خصوصية؟", options:["مسموح","خارج المدن","لا يسمح"], correct:2},
{q:"سحب النقاط؟", options:["مؤقت","نهائي","كل ما ورد"], correct:2},
{q:"الأسلحة؟", options:["بلدية","عدد","أمني"], correct:2},
{q:"اشارة شرطي؟", options:["ضوء","شرطي","افساح"], correct:1},
{q:"مستديرة؟", options:["داخل","داخل/خارج","الأسرع"], correct:0},
{q:"وقوف متمادي؟", options:["15","20","30"], correct:2},
{q:"قاصر بدون حزام؟", options:["السائق","الأهل","الراكب"], correct:0},
{q:"لوحة TAXI؟", options:["دائماً","ليل","فارغة"], correct:2},
{q:"قطر سيارة؟", options:["اصغر","نفس الوزن","لا يسمح"], correct:2},
{q:"قطر دراجة؟", options:["يسمح","اماكن","لا يسمح"], correct:2},
{q:"حديث مع الركاب؟", options:["حسب الراكب","السائق","كلاهما"], correct:0},
{q:"توضيح التعرفة؟", options:["قبل","بعد","عند السؤال"], correct:0}
];

const quiz = document.getElementById("quiz");

function renderQuiz() {
  quiz.innerHTML = "";
  questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<p>${i+1}. ${q.q}</p>`;

    q.options.forEach((opt, index) => {
      const btn = document.createElement("div");
      btn.className = "option";
      btn.innerText = opt;

      btn.onclick = () => {
        const all = div.querySelectorAll(".option");
        all.forEach((el, idx) => {
          el.style.pointerEvents = "none";
          if(idx === q.correct) el.classList.add("correct");
        });

        if(index === q.correct) {
          btn.classList.add("correct");
        } else {
          btn.classList.add("wrong");
        }
      };

      div.appendChild(btn);
    });

    quiz.appendChild(div);
  });
}

function resetQuiz() {
  renderQuiz();
}

function shuffleQuestions() {
  questions.sort(() => Math.random() - 0.5);
  renderQuiz();
}

renderQuiz();
</script>
</body>
</html>
